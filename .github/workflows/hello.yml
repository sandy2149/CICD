#This is workflow name
name: hello Workflow

#Runs on a trigger
on:
  push: 
    branches: [main]

#These are jobs inside workflow
jobs: 

#This is the name of the job
  greet:
  # This is a github runner, each job runs on a runner
    runs-on: ubuntu-latest
  
    steps:
      - name: Say hello to users
        run: echo "Hello Dosto"

      - name: Say hello to username
        run: echo "hello $USER"
        
